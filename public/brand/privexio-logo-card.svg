<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1500" role="img" aria-labelledby="title desc">
  <title id="title">Privexio logo presentation card</title>
  <desc id="desc">A clean Privexio logo pack presentation card with icon, dark version, light version, and brand colors.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020817" flood-opacity="0.10" />
    </filter>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfc" />
      <stop offset="1" stop-color="#eef5f7" />
    </linearGradient>
    <style>
      .title { font: 700 74px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -2px; }
      .heading { font: 600 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.5px; }
      .label { font: 500 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.6px; }
      .small { font: 500 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.4px; }
      .wordmark { font: 800 48px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -1.4px; }
      .wordmark-lg { font: 800 82px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -2.4px; }
    </style>
  </defs>

  <rect width="1080" height="1500" fill="url(#pageBg)" />
  <rect x="44" y="44" width="992" height="1412" rx="42" fill="#ffffff" opacity="0.72" />

  <g transform="translate(254 175)">
    <g transform="translate(0 8) scale(3.2)" fill="none" stroke="#178282" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round">
