<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="generator" content="Hostinger Horizons" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Privexio delivers managed IT, software development, cloud, web, mobile, and AI services for modern enterprises." />
		<script>
			(function () {
				const redirect = window.location.search;
				if (!redirect.startsWith('?/')) {
					return;
				}

				const decodedRoute = redirect
					.slice(2)
					.split('&')
					.map((part) => part.replace(/~and~/g, '&'))
					.join('?');

				const nextUrl = `${window.location.pathname}${decodedRoute}${window.location.hash}`;
				window.history.replaceState(null, '', nextUrl);
			})();
		</script>
		<title>Privexio - Your IT Partner</title>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
