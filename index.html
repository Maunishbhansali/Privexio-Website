		<script>
			(function () {
				const redirect = window.location.search;
				if (!redirect.startsWith('?/')) {
					return;
				}

				const decodedRoute = redirect
					.slice(2)
					.split('&')
					.map((part) => part.replace(/~and~/g, '&'))
					.join('?');

				const nextUrl = `${window.location.pathname}${decodedRoute}${window.location.hash}`;
				window.history.replaceState(null, '', nextUrl);
			})();
